version: "3.9"

name: kurio
services:
  backend:
    build: .
    container_name: kurio-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/kurio_db

  mongo:
    image: mongo:8
    container_name: kurio-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: